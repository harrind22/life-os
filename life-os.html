<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Life OS"/>
<title>Life OS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1729;--navy2:#19253d;--navy3:#253050;--navy4:#2e3a5c;
  --accent:#4f8ef7;--accent2:#6ba3ff;--green:#3ecf8e;--red:#f56565;--gold:#f0b429;--purple:#9b8afb;
  --canvas:#f7f6f2;--canvas2:#efefea;--canvas3:#e6e4dd;
  --ink:#1a1a2e;--ink2:#3d3d5c;--ink3:#6b6b8a;
  --tab-h:64px;
  --mono:'SF Mono',ui-monospace,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:12px;--r-sm:8px;
}
html,body{height:100%;font-family:var(--sans);background:var(--canvas);color:var(--ink);font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%}
#root{display:flex;flex-direction:column;height:100%;max-width:600px;margin:0 auto;position:relative}

/* TOPBAR */
.topbar{background:var(--navy);color:var(--canvas);padding:14px 18px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;min-height:54px}
.topbar-title{font-size:17px;font-weight:700;flex:1;letter-spacing:-.2px}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.5);font-family:var(--mono)}

/* SCROLL AREA */
.scroll-area{flex:1;overflow-y:auto;padding:16px 16px calc(var(--tab-h) + 16px);-webkit-overflow-scrolling:touch}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;height:var(--tab-h);background:#fff;border-top:1px solid var(--canvas3);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--ink3);font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;padding:8px 4px;position:relative;transition:color .15s}
.tab-btn.active{color:var(--accent)}
.tab-btn .tab-icon{font-size:20px;line-height:1}
.tab-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;font-family:var(--mono)}

/* CARDS */
.card{background:#fff;border:1px solid var(--canvas3);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px}

/* STAT TILES */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stat-tile{background:#fff;border:1px solid var(--canvas3);border-radius:var(--r);padding:14px 10px;text-align:center}
.stat-num{font-size:26px;font-weight:700;font-family:var(--mono);color:var(--ink);line-height:1}
.stat-label{font-size:10px;color:var(--ink3);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:var(--r-sm);border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--sans);transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:transparent;color:var(--ink2);border:1px solid var(--canvas3)}
.btn-danger{background:#fff0f0;color:var(--red);border:1px solid #fcc}
.btn-cal{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-full{width:100%;justify-content:center;padding:12px}

/* PROGRESS */
.prog-bar{height:5px;background:var(--canvas2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}

/* TAGS */
.tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;background:var(--canvas2);color:var(--ink2)}
.tag.high{background:#fff0e0;color:#c05000}
.tag.med{background:#e8f0fe;color:#1a56db}
.tag.low{background:#f0fff4;color:#065f46}
.tag.overdue{background:#fff0f0;color:#c00}
.tag.due-today{background:#fff8e0;color:#a06000}
.tag.upcoming{background:#f0f4ff;color:#3040a0}

/* PROJECT LIST */
.proj-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--canvas2);cursor:pointer;active:opacity:.7}
.proj-row:last-child{border-bottom:none}
.proj-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.proj-name{font-weight:600;font-size:15px;color:var(--ink);flex:1;min-width:0}
.proj-sub{font-size:11px;color:var(--ink3)}

/* TASKS */
.task-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--canvas2)}
.task-row:last-child{border-bottom:none}
.task-cb{width:20px;height:20px;border-radius:5px;border:2px solid var(--canvas3);background:#fff;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-cb.done{background:var(--green);border-color:var(--green)}
.task-cb.done::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.task-text{flex:1;font-size:14px;color:var(--ink);line-height:1.4}
.task-text.done{text-decoration:line-through;color:var(--ink3)}
.task-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:4px}

/* AI COACH */
.coach-box{background:linear-gradient(135deg,var(--navy2),var(--navy3));border-radius:var(--r);padding:16px;color:var(--canvas);margin-bottom:12px;position:relative;overflow:hidden}
.coach-box::before{content:'';position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;background:var(--accent);opacity:.1}
.coach-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent2);margin-bottom:6px}
.coach-text{font-size:14px;line-height:1.6;color:var(--canvas)}
.coach-chips{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.coach-chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:var(--canvas);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap}

/* HABITS */
.habit-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--canvas2)}
.habit-row:last-child{border-bottom:none}
.habit-name{font-size:13px;font-weight:500;color:var(--ink);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.habit-dots{display:flex;gap:4px;flex-shrink:0}
.habit-dot{width:26px;height:26px;border-radius:6px;cursor:pointer;border:1px solid var(--canvas3);transition:all .15s}
.habit-dot.done{border:none}
.habit-dot.today{outline:2px solid var(--accent);outline-offset:1px}
.streak-text{font-size:11px;font-family:var(--mono);color:var(--ink3);min-width:28px;text-align:right}

/* SCHEDULE */
.sched-block{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:var(--r-sm);background:var(--canvas2);margin-bottom:8px;cursor:pointer;transition:background .15s}
.sched-block:active{background:var(--canvas3)}
.sched-time{font-size:12px;font-family:var(--mono);color:var(--ink3);min-width:44px;padding-top:1px}
.sched-info{flex:1}
.sched-title{font-size:14px;font-weight:600;color:var(--ink)}
.sched-sub{font-size:12px;color:var(--ink3);margin-top:1px}

/* REVIEW */
.rating-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.rating-label{font-size:13px;color:var(--ink2);flex:1}
.stars{display:flex;gap:5px}
.star{font-size:22px;cursor:pointer;opacity:.25;transition:opacity .1s;line-height:1}
.star.on{opacity:1}
textarea.input{width:100%;border:1px solid var(--canvas3);border-radius:var(--r-sm);padding:10px 12px;font-family:var(--sans);font-size:14px;color:var(--ink);background:#fff;resize:none;min-height:80px;outline:none}
textarea.input:focus{border-color:var(--accent)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:flex;align-items:flex-end}
.modal-sheet{background:#fff;border-radius:var(--r) var(--r) 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));width:100%;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--canvas3);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--canvas3);border-radius:var(--r-sm);padding:10px 12px;font-family:var(--sans);font-size:15px;color:var(--ink);background:#fff;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-actions .btn{flex:1;justify-content:center}

/* PHASE BADGES */
.phase-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.phase-1{background:#e8f0fe;color:#1a56db}
.phase-2{background:#fdf3e7;color:#b45309}
.phase-3{background:#fce7f3;color:#9d174d}
.phase-4{background:#d1fae5;color:#065f46}
.auto-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:#e8f5e9;color:#2e7d32;font-weight:600;border:1px solid #c8e6c9}

/* DRAG */
.proj-card{background:#fff;border:1px solid var(--canvas3);border-radius:var(--r);padding:14px;margin-bottom:10px;cursor:grab;user-select:none;transition:box-shadow .15s,border-color .15s;position:relative}
.proj-card:active{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.proj-card.dragging{opacity:.4}
.proj-card.drag-over{border-color:var(--accent);border-style:dashed}
.rank-badge{position:absolute;top:10px;right:10px;font-size:10px;font-family:var(--mono);color:var(--ink3);background:var(--canvas2);padding:2px 6px;border-radius:8px}
.area-section{margin-bottom:20px}
.area-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}

/* CALENDAR STATUS */
.cal-status{font-size:13px;padding:8px 12px;border-radius:var(--r-sm);display:flex;align-items:center;gap:6px;margin-bottom:12px}
.cal-status.success{background:#e8f5e9;color:#2e7d32}
.cal-status.error{background:#fff0f0;color:#c62828}
.cal-status.loading{background:#e3f2fd;color:#1565c0}

/* BULK */
.bulk-bar{background:var(--navy2);color:var(--canvas);padding:10px 12px;border-radius:var(--r-sm);display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;font-size:13px}
.bulk-bar select{background:var(--navy3);color:var(--canvas);border:1px solid var(--navy4);border-radius:4px;padding:4px 8px;font-size:12px}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--ink3)}
.empty-icon{font-size:36px;margin-bottom:10px}

/* TODAY BANNER */
.today-banner{background:var(--navy2);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;gap:12px}
.today-banner-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent2);margin-bottom:3px}
.today-banner-text{font-size:14px;color:var(--canvas);font-weight:500;line-height:1.3}

/* UTIL */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.checkbox-input{width:18px;height:18px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;margin-top:2px}
.dot-career{background:#4f8ef7}.dot-personal{background:#3ecf8e}.dot-health{background:#f0b429}.dot-finance{background:#9b8afb}.dot-home{background:#f687b3}
.fill-career{background:#4f8ef7}.fill-personal{background:#3ecf8e}.fill-health{background:#f0b429}.fill-finance{background:#9b8afb}.fill-home{background:#f687b3}
.section-head{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);margin:18px 0 8px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--canvas3);border-radius:10px}

</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useCallback,useRef,useMemo}=React;
const STORE_KEY='lifeos_v4';
function loadData(){try{const r=localStorage.getItem(STORE_KEY);return r?JSON.parse(r):null}catch{return null}}
function saveData(d){try{localStorage.setItem(STORE_KEY,JSON.stringify(d))}catch{}}

const AREA_LABELS={career:'Career & CFA',personal:'Personal',health:'Health',finance:'Finance',home:'Home'};
function areaHex(a){return{career:'#4f8ef7',personal:'#3ecf8e',health:'#f0b429',finance:'#9b8afb',home:'#f687b3'}[a]||'#888'}
function todayKey(){return new Date().toISOString().slice(0,10)}
function addDays(base,n){const d=new Date(base);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function weekDays(){
  const today=new Date(),dow=today.getDay(),mon=new Date(today);
  mon.setDate(today.getDate()-dow+1);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d});
}
function dayName(d){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]}
function fullDayName(n){return['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][n]}
function weekProgress(){const d=new Date();return Math.min(Math.round(((d.getDay()*24+d.getHours())/168)*100),100)}
function calcStreak(log){let s=0;const t=new Date();for(let i=0;i<60;i++){const d=new Date(t);d.setDate(t.getDate()-i);if(log[d.toISOString().slice(0,10)])s++;else break;}return s;}
function dueDateTag(due){
  if(!due)return null;
  const today=todayKey();
  if(due<today)return'overdue';
  if(due===today)return'due-today';
  const diff=(new Date(due)-new Date(today))/(1000*86400);
  if(diff<=3)return'upcoming';
  return null;
}
function formatDue(due){
  if(!due)return'';
  const d=new Date(due+'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

// ── CFA LEVEL II TASK GENERATOR ──────────────────────────────────────────
function buildCFATasks(){
  const start=new Date('2026-06-17');
  function due(offsetDays){return addDays(start,offsetDays);}

  // Phase 1: Prerequisites (days 0–10)
  const prereqTasks=[
    {id:'cfa-pr1',text:'Prerequisite: Economics — complete reading + EOC',done:false,priority:'high',due:due(3),phase:1},
    {id:'cfa-pr2',text:'Prerequisite: Financial Reporting — complete reading + EOC',done:false,priority:'high',due:due(6),phase:1},
    {id:'cfa-pr3',text:'Prerequisite: Quantitative Methods — complete reading + EOC',done:false,priority:'high',due:due(9),phase:1},
  ];

  // Phase 2: Core modules (days 10–78) — weighted by exam weight
  const modules=[
    {name:'Ethics',short:'Ethics',readings:4,weight:10,start:10,end:18},
    {name:'Quantitative Methods',short:'Quant',readings:4,weight:6,start:18,end:23},
    {name:'Economics',short:'Econ',readings:4,weight:6,start:23,end:28},
    {name:'Financial Statement Analysis',short:'FSA',readings:6,weight:13,start:28,end:38},
    {name:'Corporate Issuers',short:'Corp',readings:3,weight:8,start:38,end:44},
    {name:'Equity Valuation',short:'Equity',readings:6,weight:13,start:44,end:54},
    {name:'Fixed Income',short:'FI',readings:5,weight:11,start:54,end:63},
    {name:'Derivatives',short:'Deriv',readings:4,weight:6,start:63,end:68},
    {name:'Alternative Investments',short:'Alts',readings:3,weight:6,start:68,end:73},
    {name:'Portfolio Management',short:'PM',readings:4,weight:8,start:73,end:78},
  ];

  const coreTasks=[];
  modules.forEach(m=>{
    const totalDays=m.end-m.start;
    // Each reading gets its own task with evenly spaced due dates
    const daysPerReading=Math.floor(totalDays/(m.readings+1)); // +1 for review task
    for(let r=1;r<=m.readings;r++){
      const dueOffset=m.start+Math.round(daysPerReading*r);
      coreTasks.push({
        id:`cfa-${m.short.toLowerCase()}-r${r}`,
        text:`${m.name}: Reading ${r} — study + EOC problems`,
        done:false,priority:m.weight>=11?'high':'med',
        due:due(dueOffset),phase:2,
        module:m.name
      });
    }
    // Review/formula sheet task at end of module
    coreTasks.push({
      id:`cfa-${m.short.toLowerCase()}-review`,
      text:`${m.name}: Topic review, formula sheet & summary notes`,
      done:false,priority:'high',
      due:due(m.end),phase:2,
      module:m.name
    });
  });

  // Phase 3: Mock exam week (days 78–85)
  const mockTasks=[
    {id:'cfa-mock1-am',text:'Mock Exam 1 — AM session (timed, full conditions)',done:false,priority:'high',due:due(80),phase:3},
    {id:'cfa-mock1-pm',text:'Mock Exam 1 — PM session (timed, full conditions)',done:false,priority:'high',due:due(80),phase:3},
    {id:'cfa-mock1-review',text:'Mock Exam 1 — Deep review: score every item set, flag weak topics',done:false,priority:'high',due:due(84),phase:3},
    {id:'cfa-mock1-log',text:'Build weak topic list and prioritization plan for Phase 4',done:false,priority:'high',due:due(85),phase:3},
  ];

  // Phase 4: Weak area review (days 85–137) — placeholder tasks, user adjusts after mock
  const weakTasks=[
    {id:'cfa-weak1',text:'Phase 4: Deep dive — Weak Topic #1 (update after mock exam)',done:false,priority:'high',due:due(95),phase:4},
    {id:'cfa-weak2',text:'Phase 4: Deep dive — Weak Topic #2 (update after mock exam)',done:false,priority:'high',due:due(105),phase:4},
    {id:'cfa-weak3',text:'Phase 4: Deep dive — Weak Topic #3 (update after mock exam)',done:false,priority:'med',due:due(115),phase:4},
    {id:'cfa-mock2-full',text:'Mock Exam 2 — Full AM+PM (timed)',done:false,priority:'high',due:due(120),phase:4},
    {id:'cfa-mock2-review',text:'Mock Exam 2 — Review and final gap analysis',done:false,priority:'high',due:due(122),phase:4},
    {id:'cfa-final-review',text:'Final formula sheet review and ethics re-read',done:false,priority:'high',due:due(133),phase:4},
    {id:'cfa-exam-day',text:'🎯 CFA Level II Exam Day',done:false,priority:'high',due:due(137),phase:4},
  ];

  return [...prereqTasks,...coreTasks,...mockTasks,...weakTasks];
}

function defaultData(){
  const cfaTasks=buildCFATasks();
  return {
    projects:[
      {id:'p1',name:'CFA Level II',area:'career',color:'career',pct:0,autoCalc:true,
       notes:'Target: Nov 1 2026 exam. 4 phases: prereqs → core modules → mock → weak areas. 52-day buffer.',
       priority:0,tasks:cfaTasks},
      {id:'p2',name:'Baird/Artisan Outreach',area:'career',color:'career',pct:10,autoCalc:false,notes:'Use existing coverage relationship',priority:1,tasks:[
        {id:'t7',text:'Update resume for AM positioning',done:false,priority:'high',due:null},
        {id:'t8',text:'Draft outreach to Baird contact',done:false,priority:'high',due:null},
      ]},
      {id:'p3',name:'Den/Office Renovation',area:'home',color:'home',pct:45,autoCalc:false,notes:'Navy walls, wainscoting, TV placement',priority:0,tasks:[
        {id:'t4',text:'Finalize paint color (navy)',done:true,priority:'med',due:null},
        {id:'t5',text:'Source wainscoting panels',done:false,priority:'med',due:null},
        {id:'t6',text:'Schedule contractor walk-through',done:false,priority:'low',due:null},
      ]},
      {id:'p4',name:'Taxable Brokerage Build',area:'finance',color:'finance',pct:30,autoCalc:false,notes:'Coast FIRE reached; surplus → brokerage',priority:0,tasks:[
        {id:'t9',text:'Set up auto-invest schedule',done:false,priority:'med',due:null},
        {id:'t10',text:'Review Q2 portfolio allocation',done:false,priority:'low',due:null},
      ]},
    ],
    habits:[
      {id:'h1',name:'CFA study (≥1 hr)',color:'career',log:{}},
      {id:'h2',name:'Exercise',color:'health',log:{}},
      {id:'h3',name:'Read (non-CFA)',color:'personal',log:{}},
      {id:'h4',name:'No late-night screens',color:'health',log:{}},
    ],
    schedule:[
      {id:'s1',day:1,time:'06:00',duration:60,title:'CFA study block',projectId:'p1',notes:'Follow daily task'},
      {id:'s2',day:1,time:'07:30',duration:30,title:'Exercise',projectId:null,notes:''},
      {id:'s3',day:3,time:'06:00',duration:60,title:'CFA study block',projectId:'p1',notes:''},
      {id:'s4',day:3,time:'12:00',duration:30,title:'Market review',projectId:'p4',notes:''},

function calcAutoPct(tasks){
  if(!tasks||tasks.length===0)return 0;
  const done=tasks.filter(t=>t.done).length;
  return Math.round((done/tasks.length)*100);
}

async function askClaude(prompt){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,

      messages:[{role:'user',content:prompt}]})
  });
  const d=await res.json();
  return d.content?.[0]?.text||'Unable to reach coach.';
}

// ── CALENDAR PUSH MODAL ───────────────────────────────────────────────────
function CalendarPushModal({block,projects,onClose,onPushed}){
  const [status,setStatus]=useState(null);const [msg,setMsg]=useState('');
  const proj=block.projectId?projects.find(p=>p.id===block.projectId):null;
  function nextOccurrence(dayNum,time){
    const now=new Date(),today=now.getDay();
    let diff=dayNum-today;
    if(diff<0||(diff===0&&now.getHours()>=parseInt(time)))diff+=7;
    const d=new Date(now);d.setDate(now.getDate()+diff);
    const [h,m]=time.split(':');d.setHours(parseInt(h),parseInt(m),0,0);return d;
  }
  async function push(){
    setStatus('loading');
    const start=nextOccurrence(block.day,block.time);
    const end=new Date(start.getTime()+block.duration*60000);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,
          system:'Calendar assistant. Use Google Calendar MCP to create the event. Reply only: SUCCESS or ERROR: reason.',
          messages:[{role:'user',content:`Create event: Title="${block.title}", Start="${start.toISOString()}", End="${end.toISOString()}", TimeZone="America/Chicago"${proj?`, Description="Project: ${proj.name}"`:''}.`}],
          mcp_servers:[{type:'url',url:'https://calendarmcp.googleapis.com/mcp/v1',name:'google-calendar'}]
        })
      });
      const data=await res.json();
      const txt=data.content?.map(c=>c.text||'').join('')||'';
      if(txt.includes('SUCCESS')||txt.includes('created')||txt.includes('event')){
        setStatus('success');setMsg(`Added: ${block.title}`);setTimeout(()=>onPushed(),1500);
      } else {setStatus('error');setMsg(txt.slice(0,120));}
    }catch(e){setStatus('error');setMsg(e.message);}
  }
  const start=nextOccurrence(block.day,block.time);
  const end=new Date(start.getTime()+block.duration*60000);
  return React.createElement('div',{className:'modal-backdrop'},
    React.createElement('div',{className:'modal'},
      React.createElement('h3',null,'📅 Push to Google Calendar'),
      React.createElement('div',{style:{background:'var(--canvas2)',borderRadius:'var(--r-sm)',padding:'12px 14px',marginBottom:16}},
        React.createElement('div',{style:{fontWeight:700,fontSize:15,color:'var(--ink)',marginBottom:4}},block.title),
        React.createElement('div',{style:{fontSize:13,color:'var(--ink2)'}},`${fullDayName(block.day)} ${block.time} · ${block.duration} min`),
        React.createElement('div',{style:{fontSize:12,color:'var(--ink3)',marginTop:4}},`Next: ${start.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})} ${start.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})} – ${end.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`),
      ),
      status==='success'&&React.createElement('div',{className:'cal-status success',style:{marginBottom:12}},`✓ ${msg}`),
      status==='error'&&React.createElement('div',{className:'cal-status error',style:{marginBottom:12}},`✗ ${msg}`),
      status==='loading'&&React.createElement('div',{className:'cal-status loading',style:{marginBottom:12}},'Adding to calendar...'),
      React.createElement('div',{className:'modal-actions'},
        React.createElement('button',{className:'btn btn-ghost',onClick:onClose},'Cancel'),
        status!=='success'&&React.createElement('button',{className:'btn btn-cal',onClick:push,disabled:status==='loading'},status==='loading'?'Adding...':'Add to Google Calendar'),
      ),
    )
  );
}

  }
